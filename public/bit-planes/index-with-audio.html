<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Cormorant+Garamond&amp;display=swap" rel="stylesheet">
    <title>Bit Planes Multiplayer</title>
<link href="styles37ad.css?5d2872322fef463c838c" rel="stylesheet">
    
    <!-- Audio System -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <style>
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 12px;
            max-width: 200px;
        }
        .audio-controls h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }
        .audio-controls label {
            display: block;
            margin: 5px 0;
        }
        .audio-controls input[type="range"] {
            width: 100%;
        }
        .audio-test {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .audio-test button {
            background: #444;
            border: none;
            color: white;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        .audio-test button:hover {
            background: #666;
        }
    </style>
</head>

<body>
    <div class="audio-controls">
        <h3>🎮 Audio Controls</h3>
        <label>
            🔊 Master Volume:
            <input type="range" id="masterVolume" min="0" max="100" value="70">
        </label>
        <label>
            🔇 <input type="checkbox" id="muteAudio"> Mute All
        </label>
        <div class="audio-test">
            <button onclick="window.bitplanesAudio?.playSound('machine_gun')">🔫 Gun</button>
            <button onclick="window.bitplanesAudio?.playSound('cannon')">💥 Cannon</button>
            <button onclick="window.bitplanesAudio?.playSound('explosion')">💣 Explosion</button>
            <button onclick="window.bitplanesAudio?.playSound('hit')">🎯 Hit</button>
            <button onclick="window.bitplanesAudio?.playSound('engine')">🚀 Engine</button>
            <button onclick="window.bitplanesAudio?.playSound('laser')">🔦 Laser</button>
            <button onclick="window.bitplanesAudio?.playSound('click')">🖱️ Click</button>
        </div>
    </div>

    <div id="game"></div>
    
    <!-- Original Game Script -->
    <script src="index37ad.js?5d2872322fef463c838c"></script>
    
    <!-- Multiplayer Overlay -->
    <script src="multiplayer-overlay.js"></script>
    
    <!-- Audio System -->
    <script src="audio-manager.js"></script>
    
    <!-- Performance Fixes -->
    <script src="performance-fix.js"></script>
    
    <script>
        // Initialize audio system
        document.addEventListener('DOMContentLoaded', function() {
            // Wait a bit for game to load
            setTimeout(() => {
                if (window.bitplanesAudio) {
                    console.log('Audio system initialized');
                    
                    // Hook into game events
                    window.addEventListener('keydown', function(e) {
                        if (e.code === 'Space') {
                            window.bitplanesAudio?.playSound('machine_gun');
                        } else if (e.code === 'KeyX') {
                            window.bitplanesAudio?.playSound('cannon');
                        }
                    });
                    
                    // Hook into UI clicks
                    document.addEventListener('click', function() {
                        window.bitplanesAudio?.playSound('click');
                    });
                    
                    // Setup volume controls
                    const masterVolume = document.getElementById('masterVolume');
                    const muteAudio = document.getElementById('muteAudio');
                    
                    if (masterVolume) {
                        masterVolume.addEventListener('input', function(e) {
                            const volume = e.target.value / 100;
                            window.bitplanesAudio?.setMasterVolume(volume);
                        });
                    }
                    
                    if (muteAudio) {
                        muteAudio.addEventListener('change', function(e) {
                            window.bitplanesAudio?.setMuted(e.target.checked);
                        });
                    }
                }
            }, 1000);
        });
    </script>
</body>
</html>
